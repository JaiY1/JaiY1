<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morning Digest</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #111214;
      color: #e8e8e8;
      min-height: 100vh;
    }

    /* Top nav */
    .navbar {
      background: #1a1b1e;
      border-bottom: 1px solid #2a2a2a;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .nav-logo span { color: #c8102e; }

    .search-bar {
      flex: 1;
      max-width: 560px;
      display: flex;
      align-items: center;
      background: #2a2b2f;
      border: 1px solid #3a3a3a;
      border-radius: 24px;
      padding: 9px 18px;
      gap: 10px;
      margin: 0 auto;
    }

    .search-bar input {
      background: none;
      border: none;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }

    .search-bar input::placeholder { color: #666; }

    .search-icon { color: #666; font-size: 1rem; }

    .nav-date {
      font-size: 0.78rem;
      color: #555;
      white-space: nowrap;
    }

    /* Category tabs */
    .tabs-bar {
      background: #1a1b1e;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 28px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
    }

    .tabs-bar::-webkit-scrollbar { display: none; }

    .tab {
      padding: 13px 18px;
      font-size: 0.85rem;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.2s;
      text-transform: capitalize;
    }

    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #c8102e; font-weight: 600; }

    /* Main layout */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* Briefing section */
    .briefing-section {
      margin-bottom: 36px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 0.75rem;
    }

    .briefing-card {
      background: #1a1b1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px 28px;
    }

    .briefing-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ai-badge {
      background: #c8102e22;
      color: #c8102e;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .briefing-bullets { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    .briefing-bullet {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .briefing-bullet:hover {
      background: #222428;
      border-color: #333;
    }

    .bullet-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c8102e;
      margin-top: 7px;
      flex-shrink: 0;
    }

    .bullet-text { font-size: 0.93rem; color: #ccc; line-height: 1.5; flex: 1; }

    .bullet-tag {
      font-size: 0.68rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      margin-top: 4px;
    }

    .bullet-arrow { color: #444; font-size: 0.85rem; margin-top: 3px; }

    /* Topics grid */
    .topics-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .topics-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .topics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    @media (max-width: 900px) { .topics-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .topics-grid { grid-template-columns: 1fr; } }

    .topic-card {
      background: #1e1f23;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .topic-card:hover { border-color: #444; background: #222428; }
    .topic-card.active { border-color: #c8102e; }

    .topic-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-transform: capitalize;
    }

    .topic-name .arrow { color: #555; font-size: 0.85rem; }

    .topic-articles { display: flex; flex-direction: column; gap: 12px; }

    .topic-article {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      text-decoration: none;
    }

    .topic-article:not(:last-child) {
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    .article-text { flex: 1; }

    .article-headline {
      font-size: 0.87rem;
      color: #ddd;
      line-height: 1.45;
      font-weight: 500;
    }

    .article-headline:hover { color: #fff; }

    .article-meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
    }

    .article-source-tag {
      font-size: 0.7rem;
      color: #555;
    }

    .article-thumb {
      width: 72px;
      height: 52px;
      object-fit: cover;
      border-radius: 6px;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    .thumb-placeholder {
      width: 72px;
      height: 52px;
      background: #2a2a2a;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #444;
    }

    /* Article detail panel */
    .detail-panel {
      display: none;
      background: #1a1b1e;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 24px;
    }

    .detail-panel.visible { display: block; }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .detail-topic {
      font-size: 0.78rem;
      color: #c8102e;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .close-btn:hover { border-color: #555; color: #fff; }

    .detail-articles { display: flex; flex-direction: column; gap: 14px; }

    .detail-article {
      display: flex;
      gap: 16px;
      padding: 14px;
      background: #222428;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }

    .detail-article:hover { border-color: #444; }

    .detail-article-text { flex: 1; }

    .detail-article-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .detail-article-summary {
      font-size: 0.82rem;
      color: #888;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .detail-article-source {
      font-size: 0.72rem;
      color: #555;
    }

    .detail-thumb {
      width: 100px;
      height: 70px;
      object-fit: cover;
      border-radius: 6px;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
      color: #555;
      gap: 16px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2a2a2a;
      border-top-color: #c8102e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-logo">DAILY<span>DIGEST</span></div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search topics, stories..." id="searchInput" oninput="filterSearch(this.value)"/>
  </div>
  <div class="nav-date" id="navDate"></div>
</nav>

<!-- Tabs -->
<div class="tabs-bar" id="tabsBar">
  <div class="tab active" onclick="showTab('all', this)">For You</div>
</div>

<!-- Main -->
<div class="main" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    <div>Fetching your personalized digest...</div>
  </div>
</div>

<script>
  const USER_PHONE = "test_user";
  const IS_ADMIN = new URLSearchParams(window.location.search).get("admin") === "true";
  let allData = null;
  let activeTab = "all";

  // Set date
  document.getElementById("navDate").textContent = new Date().toLocaleDateString("en-US", {
    weekday: "long", month: "long", day: "numeric"
  });

  async function loadDigest() {
    try {
      const res = await fetch(`/feed/${USER_PHONE}/data`);
      allData = await res.json();
      if (allData.error) {
        document.getElementById("mainContent").innerHTML = `<div class="loading">${allData.error}</div>`;
        return;
      }
      buildTabs();
      render();
    } catch(e) {
      document.getElementById("mainContent").innerHTML =
        `<div class="loading">Failed to load. Is the server running?</div>`;
    }
  }

  function buildTabs() {
    const cats = [...new Set(allData.articles.map(a => a.category.toLowerCase()))];
    const bar = document.getElementById("tabsBar");
    cats.forEach(cat => {
      const div = document.createElement("div");
      div.className = "tab";
      div.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      div.onclick = () => showTab(cat, div);
      bar.appendChild(div);
    });
  }

  function showTab(cat, el) {
    activeTab = cat;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    render();
  }

  function render(filter = "") {
    let articles = allData.articles;
    if (activeTab !== "all") {
      articles = articles.filter(a => a.category.toLowerCase() === activeTab);
    }
    if (filter) {
      articles = articles.filter(a =>
        a.title.toLowerCase().includes(filter) ||
        (a.summary || "").toLowerCase().includes(filter)
      );
    }

    // Group by category
    const grouped = {};
    articles.forEach(a => {
      const cat = a.category.toLowerCase();
      if (!grouped[cat]) grouped[cat] = [];
      grouped[cat].push(a);
    });

    const costHtml = IS_ADMIN && allData.cost_today > 0
      ? `<div style="font-size:0.75rem;color:#444;margin-bottom:20px;">AI cost today: $${allData.cost_today.toFixed(6)}</div>`
      : "";

    const briefingHtml = renderBriefing(allData.briefing, allData.articles);
    const gridHtml = renderGrid(grouped);

    document.getElementById("mainContent").innerHTML = `
      ${costHtml}
      ${briefingHtml}
      <div id="detailPanel" class="detail-panel"></div>
      <div class="topics-header">
        <div class="topics-title">Your Topics</div>
      </div>
      <div class="topics-grid" id="topicsGrid">${gridHtml}</div>
    `;
  }

  function renderBriefing(bullets, articles) {
    if (!bullets || !bullets.length) return "";
    const items = bullets.map((b, i) => `
      <li class="briefing-bullet" onclick="showBulletDetail(${i})">
        <div class="bullet-dot"></div>
        <div style="flex:1">
          <div class="bullet-text">${b.point}</div>
          <div class="bullet-tag">${b.category || ""}</div>
        </div>
        <div class="bullet-arrow">›</div>
      </li>
    `).join("");

    return `
      <div class="briefing-section">
        <div class="section-header">
          <div class="section-title">Morning Briefing</div>
        </div>
        <div class="briefing-card">
          <div class="briefing-title">
            What you need to know today
            <span class="ai-badge">AI</span>
          </div>
          <ul class="briefing-bullets">${items}</ul>
        </div>
      </div>
    `;
  }

  function showBulletDetail(index) {
    const bullet = allData.briefing[index];
    const cat = (bullet.category || "").toLowerCase();
    const keywords = bullet.keywords || [];

    // Find related articles
    let related = allData.articles.filter(a => {
      const matchCat = cat && a.category.toLowerCase().includes(cat);
      const matchKeyword = keywords.some(k =>
        a.title.toLowerCase().includes(k.toLowerCase()) ||
        (a.summary || "").toLowerCase().includes(k.toLowerCase())
      );
      return matchCat || matchKeyword;
    }).slice(0, 5);

    if (!related.length) related = allData.articles.slice(0, 5);

    const panel = document.getElementById("detailPanel");
    panel.className = "detail-panel visible";
    panel.innerHTML = `
      <div class="detail-header">
        <div class="detail-topic">${cat.toUpperCase()} — Related Stories</div>
        <button class="close-btn" onclick="document.getElementById('detailPanel').className='detail-panel'">✕ Close</button>
      </div>
      <div style="font-size:0.9rem;color:#bbb;margin-bottom:16px;line-height:1.5;">${bullet.point}</div>
      <div class="detail-articles">
        ${related.map(a => `
          <a class="detail-article" href="${a.url}" target="_blank">
            <div class="detail-article-text">
              <div class="detail-article-title">${a.title}</div>
              ${a.summary ? `<div class="detail-article-summary">${a.summary}</div>` : ""}
              <div class="detail-article-source">${a.source || ""}</div>
            </div>
            ${a.image_url
              ? `<img class="detail-thumb" src="${a.image_url}" onerror="this.style.display='none'" />`
              : ""}
          </a>
        `).join("")}
      </div>
    `;
    panel.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function renderGrid(grouped) {
    return Object.entries(grouped).map(([cat, articles]) => {
      const topArticles = articles.slice(0, 3);
      const articlesHtml = topArticles.map(a => `
        <a class="topic-article" href="${a.url}" target="_blank">
          <div class="article-text">
            <div class="article-headline">${a.title}</div>
            <div class="article-meta-row">
              <span class="article-source-tag">${a.source || ""}</span>
            </div>
          </div>
          ${a.image_url
            ? `<img class="article-thumb" src="${a.image_url}" onerror="this.style.display='none'" />`
            : `<div class="thumb-placeholder">${getCatEmoji(cat)}</div>`}
        </a>
      `).join("");

      return `
        <div class="topic-card">
          <div class="topic-name">
            ${cat.charAt(0).toUpperCase() + cat.slice(1)}
            <span class="arrow">›</span>
          </div>
          <div class="topic-articles">${articlesHtml}</div>
        </div>
      `;
    }).join("");
  }

  function getCatEmoji(cat) {
    const map = { iran: "🔥", "middle east": "🔥", timberwolves: "🐺", arsenal: "⚽", ai: "🤖", tech: "💻", finance: "📈", sports: "🏀", nba: "🏀" };
    return map[cat] || "📰";
  }

  function filterSearch(val) {
    if (!allData) return;
    render(val.toLowerCase());
  }

  loadDigest();
</script>
</body>
</html>
