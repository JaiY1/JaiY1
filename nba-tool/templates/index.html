<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NBA Stats Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      color: #c8102e;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    .card {
      background: #13131a;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      background: #1e1e2a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #c8102e;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #c8102e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #a00d24; }
    button:disabled { background: #555; cursor: not-allowed; }

    .status {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 12px;
      min-height: 20px;
    }

    .answer-box {
      background: #1a1a26;
      border-left: 4px solid #c8102e;
      border-radius: 8px;
      padding: 18px;
      margin-top: 16px;
      font-size: 1rem;
      line-height: 1.6;
      display: none;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .stat-tile {
      background: #13131a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }

    .stat-tile .val {
      font-size: 1.6rem;
      font-weight: 700;
      color: #c8102e;
    }

    .stat-tile .lbl {
      font-size: 0.75rem;
      color: #777;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .error { color: #ff6b6b; font-size: 0.9rem; margin-top: 10px; }

    .injury-warning {
      background: #2a1a00;
      border-left: 4px solid #f59e0b;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 0.9rem;
      color: #fbbf24;
      display: none;
    }

    .missed-list {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #d97706;
    }

    .autocomplete-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .autocomplete-wrapper input {
      margin-bottom: 0;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1e1e2a;
      border: 1px solid #444;
      border-top: none;
      border-radius: 0 0 8px 8px;
      z-index: 100;
      max-height: 240px;
      overflow-y: auto;
    }

    .autocomplete-list div {
      padding: 11px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      border-bottom: 1px solid #2a2a3a;
      transition: background 0.15s;
    }

    .autocomplete-list div:last-child { border-bottom: none; }
    .autocomplete-list div:hover, .autocomplete-list div.active {
      background: #c8102e22;
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>NBA STATS TOOL</h1>
  <p class="subtitle">Enter a player and ask anything about their stats.</p>

  <div class="card">
    <label>Player Name</label>
    <div class="autocomplete-wrapper">
      <input type="text" id="playerInput" placeholder="e.g. LeBron James" autocomplete="off" />
      <div class="autocomplete-list" id="autocompleteList" style="display:none;"></div>
    </div>

    <div class="row">
      <div>
        <label>Season</label>
        <select id="seasonSelect">
          <option value="2025-26">2025-26</option>
          <option value="2024-25">2024-25</option>
          <option value="2023-24">2023-24</option>
          <option value="2022-23">2022-23</option>
        </select>
      </div>
      <div>
        <label>Game Sample</label>
        <select id="lastNSelect">
          <option value="0">Full Season</option>
          <option value="5">Last 5 Games</option>
          <option value="10">Last 10 Games</option>
          <option value="15">Last 15 Games</option>
          <option value="20">Last 20 Games</option>
        </select>
      </div>
    </div>

    <label>Question</label>
    <input type="text" id="questionInput" placeholder="e.g. How often does he score 30 points?" />

    <button id="submitBtn" onclick="submit()">Get Stats</button>

    <div class="error" id="errorMsg"></div>
    <div class="status" id="statusMsg"></div>
    <div class="injury-warning" id="injuryWarning"></div>
    <div class="answer-box" id="answerBox"></div>
    <div class="stat-grid" id="statGrid"></div>
  </div>

<script>
  async function submit() {
    const player = document.getElementById("playerInput").value.trim();
    const season = document.getElementById("seasonSelect").value;
    const lastN = parseInt(document.getElementById("lastNSelect").value);
    const question = document.getElementById("questionInput").value.trim();

    const btn = document.getElementById("submitBtn");
    const errEl = document.getElementById("errorMsg");
    const statusEl = document.getElementById("statusMsg");
    const answerBox = document.getElementById("answerBox");
    const injuryEl = document.getElementById("injuryWarning");
    const statGrid = document.getElementById("statGrid");

    // Reset
    errEl.textContent = "";
    statusEl.textContent = "";
    answerBox.style.display = "none";
    injuryEl.style.display = "none";
    statGrid.innerHTML = "";

    if (!player) { errEl.textContent = "Enter a player name."; return; }
    if (!question) { errEl.textContent = "Enter a question."; return; }

    btn.disabled = true;
    statusEl.textContent = "Fetching stats from NBA.com...";

    try {
      // Step 1: fetch & store player data
      const searchRes = await fetch("/api/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ player, season })
      });
      const searchData = await searchRes.json();

      if (!searchRes.ok) {
        errEl.textContent = searchData.error;
        btn.disabled = false;
        statusEl.textContent = "";
        return;
      }

      statusEl.textContent = `Loaded ${searchData.player} — ${searchData.games_loaded} games. Analyzing...`;

      // Step 2: ask question
      const askRes = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ player: searchData.player, question, season, last_n: lastN })
      });
      const askData = await askRes.json();

      statusEl.textContent = "";

      if (!askRes.ok) {
        errEl.textContent = askData.error;
      } else {
        answerBox.textContent = askData.answer;
        answerBox.style.display = "block";

        if (askData.injury_warning) {
          let html = askData.injury_warning;
          if (askData.missed_games && askData.missed_games.length > 0) {
            html += `<div class="missed-list">Missed: ${askData.missed_games.join(", ")}</div>`;
          }
          injuryEl.innerHTML = html;
          injuryEl.style.display = "block";
        }

        const s = askData.stats;
        const scopeLbl = lastN > 0 ? `L${lastN} High` : "Season High";
        const scopeLblLow = lastN > 0 ? `L${lastN} Low` : "Season Low";
        const tiles = [
          { val: s.average, lbl: "Average" },
          { val: s.total_games, lbl: "Games Played" },
          { val: s.max, lbl: scopeLbl },
          { val: s.min, lbl: scopeLblLow },
        ];
        if (s.frequency_pct !== undefined) {
          tiles.push({ val: s.frequency_pct + "%", lbl: `Hit ${s.threshold}+ Threshold` });
          tiles.push({ val: s.games_above + "/" + s.total_games, lbl: "Games Above" });
        }

        statGrid.innerHTML = tiles.map(t => `
          <div class="stat-tile">
            <div class="val">${t.val}</div>
            <div class="lbl">${t.lbl}</div>
          </div>
        `).join("");
      }
    } catch (e) {
      errEl.textContent = "Network error. Is the server running?";
      statusEl.textContent = "";
    }

    btn.disabled = false;
  }

  document.getElementById("questionInput").addEventListener("keydown", e => {
    if (e.key === "Enter") submit();
  });

  // Autocomplete
  const playerInput = document.getElementById("playerInput");
  const acList = document.getElementById("autocompleteList");
  let acIndex = -1;
  let acDebounce = null;

  playerInput.addEventListener("input", () => {
    clearTimeout(acDebounce);
    const q = playerInput.value.trim();
    if (q.length < 2) { acList.style.display = "none"; return; }
    acDebounce = setTimeout(() => fetchSuggestions(q), 200);
  });

  async function fetchSuggestions(q) {
    const res = await fetch(`/api/players?q=${encodeURIComponent(q)}`);
    const names = await res.json();
    acIndex = -1;
    if (!names.length) { acList.style.display = "none"; return; }
    acList.innerHTML = names.map(n => `<div>${n}</div>`).join("");
    acList.style.display = "block";
    acList.querySelectorAll("div").forEach(el => {
      el.addEventListener("mousedown", () => {
        playerInput.value = el.textContent;
        acList.style.display = "none";
      });
    });
  }

  playerInput.addEventListener("keydown", e => {
    const items = acList.querySelectorAll("div");
    if (acList.style.display === "none" || !items.length) {
      if (e.key === "Enter") submit();
      return;
    }
    if (e.key === "ArrowDown") {
      acIndex = Math.min(acIndex + 1, items.length - 1);
    } else if (e.key === "ArrowUp") {
      acIndex = Math.max(acIndex - 1, -1);
    } else if (e.key === "Enter") {
      if (acIndex >= 0) {
        playerInput.value = items[acIndex].textContent;
        acList.style.display = "none";
        acIndex = -1;
      } else {
        submit();
      }
      return;
    } else if (e.key === "Escape") {
      acList.style.display = "none";
      return;
    }
    items.forEach((el, i) => el.classList.toggle("active", i === acIndex));
  });

  document.addEventListener("click", e => {
    if (!e.target.closest(".autocomplete-wrapper")) acList.style.display = "none";
  });
</script>
</body>
</html>
